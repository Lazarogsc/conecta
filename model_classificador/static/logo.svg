<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle with gradient -->
  <circle cx="32" cy="32" r="30" fill="url(#grad)"/>
  
  <!-- Connection nodes - representing social connections -->
  <!-- Central node -->
  <circle cx="32" cy="28" r="5" fill="white" opacity="0.95"/>
  <!-- Left node -->
  <circle cx="20" cy="38" r="4" fill="white" opacity="0.8"/>
  <!-- Right node -->
  <circle cx="44" cy="38" r="4" fill="white" opacity="0.8"/>
  
  <!-- Connection lines -->
  <line x1="28" y1="31" x2="23" y2="35" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="36" y1="31" x2="41" y2="35" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="24" y1="38" x2="40" y2="38" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Subtle sparkle/glow -->
  <circle cx="42" cy="20" r="2" fill="white" opacity="0.4"/>
  <circle cx="46" cy="24" r="1.2" fill="white" opacity="0.3"/>
</svg>
