<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Conecta</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logo.svg') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body>

<a href="#login-form" class="skip-link">Pular para o formulário de login</a>

<main class="auth-wrapper" role="main">
    <div class="auth-card">
        <div class="auth-logo-area">
            <img src="{{ url_for('static', filename='logo.svg') }}" alt="Logo da rede social Conecta" class="auth-logo-img">
            <h1 class="auth-brand">Conecta</h1>
        </div>
        <p class="subtitle">Bem-vindo(a) de volta!</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="auth-alert auth-alert-{{ category }}" role="alert">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" id="login-form" aria-label="Formulário de login">
            <div class="input-group">
                <label for="email-login">E-mail</label>
                <input type="email" id="email-login" name="email" placeholder="nome@exemplo.com" required autocomplete="email">
            </div>

            <div class="input-group">
                <label for="senha-login">Senha</label>
                <input type="password" id="senha-login" name="senha" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit">Entrar</button>
        </form>

        <p class="auth-footer">
            Ainda não tem uma conta?
            <a href="{{ url_for('register') }}">Cadastre-se</a>
        </p>
    </div>
</main>

</body>
</html>
